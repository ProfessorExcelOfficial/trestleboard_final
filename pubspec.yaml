name: trestleboard_final
description: Trestle Board – Digital governance platform for Masonic lodges.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.0.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.6.0
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/app_icon_foreground.png
    - assets/images/profex.png

# -------------------------------------------------------
# ANDROID ADAPTIVE APP ICON CONFIGURATION
# -------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: false

   # Required (fallback)
  image_path: "assets/images/app_icon_foreground.png"

  adaptive_icon_background: "#0A2A66"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"